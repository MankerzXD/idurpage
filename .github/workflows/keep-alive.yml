name: Supabase Keep-Alive Cron

on:
  schedule:
    # Corre cada 3 días a las 00:00 UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -X GET "https://rjhrfadbfscpdlgthdzt.supabase.co/rest/v1/equipment?select=id&limit=1" \
          -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "Ping a Supabase completado con éxito."
